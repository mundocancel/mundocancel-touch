<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>mundocancel · Touch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
    <div class="phone">
        <header class="statusbar">
            <div class="logo-area">
                <span class="material-symbols-outlined" aria-hidden="true">deployed_code</span>
                <span class="logo-text">mundocancel</span>
            </div>
            <button class="help-btn" id="helpBtn" type="button">AYUDA</button>
        </header>

        <main class="main-scroll" id="mainContent">
            <section class="screen" id="homeScreen">
                <div class="section-label">OPERACIONES</div>
                <div class="card-grid">
                    <button class="touch-card" data-action="budget" type="button">
                        <span class="material-symbols-outlined" aria-hidden="true">edit_square</span>
                        <span class="card-title">PRESUPUESTO</span>
                    </button>
                    <button class="touch-card" data-action="projects" type="button">
                        <span class="material-symbols-outlined" aria-hidden="true">folder_open</span>
                        <span class="card-title">PROYECTOS</span>
                    </button>
                    <button class="touch-card" data-action="cutter" type="button">
                        <span class="material-symbols-outlined" aria-hidden="true">content_cut</span>
                        <span class="card-title">CORTE</span>
                    </button>
                    <button class="touch-card" data-action="glass" type="button">
                        <span class="material-symbols-outlined" aria-hidden="true">blur_on</span>
                        <span class="card-title">CRISTAL</span>
                    </button>
                </div>

                <div class="divider"></div>
                <div class="section-label">ACTIVIDAD RECIENTE</div>
                <div class="pill-row" id="recentActivity">
                    <button class="pill" type="button"><span class="status-dot" aria-hidden="true"></span> #078 LISTO</button>
                    <button class="pill" type="button"><span class="material-symbols-outlined" aria-hidden="true">visibility</span> #045 VISTO</button>
                    <button class="pill" type="button"><span class="material-symbols-outlined" aria-hidden="true">payments</span> PAGO</button>
                </div>
            </section>

            <section class="screen hidden" id="projectsScreen">
                <div class="module-screen">
                    <div class="section-label">PROYECTOS ACTIVOS</div>
                    <input class="input-line" id="projectSearch" placeholder="BUSCAR PROYECTO O CLIENTE" autocomplete="off">
                    <div id="projectList"></div>
                    <button class="btn-secondary back-btn" type="button">VOLVER</button>
                </div>
            </section>

            <section class="screen hidden" id="budgetScreen">
                <div class="module-screen">
                    <div class="section-label">NUEVO PRESUPUESTO</div>
                    <div class="step-indicator" aria-label="Pasos">
                        <div class="step-bar active" data-step="1"></div>
                        <div class="step-bar" data-step="2"></div>
                        <div class="step-bar" data-step="3"></div>
                    </div>

                    <div class="step-panel" id="budgetStep1">
                        <div class="text-center step-title">CLIENTE</div>
                        <label class="sr-only" for="clientInput">Cliente</label>
                        <input class="input-line" id="clientInput" placeholder="NOMBRE O TELÉFONO" autocomplete="off">
                        <button class="btn-primary next-btn" type="button" data-next="budgetStep2">SIGUIENTE</button>
                    </div>

                    <div class="step-panel hidden" id="budgetStep2">
                        <div class="text-center step-title">MEDIDAS</div>
                        <label class="sr-only" for="widthInput">Ancho mm</label>
                        <input class="input-line" id="widthInput" placeholder="ANCHO (MM)" inputmode="numeric" autocomplete="off">
                        <label class="sr-only" for="heightInput">Alto mm</label>
                        <input class="input-line" id="heightInput" placeholder="ALTO (MM)" inputmode="numeric" autocomplete="off">
                        <button class="btn-primary next-btn" type="button" data-next="budgetStep3">SIGUIENTE</button>
                    </div>

                    <div class="step-panel hidden" id="budgetStep3">
                        <div class="text-center step-title">TIPO</div>
                        <div class="card-grid" id="typeGrid">
                            <button class="touch-card selected" type="button" data-type="Ventana">VENTANA</button>
                            <button class="touch-card" type="button" data-type="Puerta">PUERTA</button>
                            <button class="touch-card" type="button" data-type="Fijo">FIJO</button>
                            <button class="touch-card" type="button" data-type="Corrediza">CORREDIZA</button>
                        </div>
                        <button class="btn-primary success-btn" id="finishBudget" type="button" style="background:#1B5E20;">ENVIAR</button>
                    </div>

                    <button class="btn-secondary back-btn" type="button">CANCELAR</button>
                </div>
            </section>

            <section class="screen hidden" id="cutterScreen">
                <div class="module-screen">
                    <div class="section-label">OPTIMIZADOR DE CORTE</div>
                    <div class="card-grid" id="cutTypeGrid">
                        <button class="touch-card" type="button" data-type="linear">
                            <span class="material-symbols-outlined" aria-hidden="true">horizontal_rule</span>
                            <span class="card-title">PERFIL</span>
                        </button>
                        <button class="touch-card" type="button" data-type="panel">
                            <span class="material-symbols-outlined" aria-hidden="true">crop_square</span>
                            <span class="card-title">VIDRIO</span>
                        </button>
                    </div>

                    <div id="cutLinear" class="hidden">
                        <div class="section-label">PIEZAS (MM)</div>
                        <div id="linearList" class="piece-list"></div>
                        <button class="btn-secondary" id="addLinear" type="button">+ AGREGAR</button>
                        <button class="btn-primary" id="calcLinear" type="button">CALCULAR</button>
                    </div>

                    <div id="cutPanel" class="hidden">
                        <div class="section-label">PAÑOS (ANCHO x ALTO)</div>
                        <div id="panelList" class="piece-list"></div>
                        <button class="btn-secondary" id="addPanel" type="button">+ AGREGAR</button>
                        <button class="btn-primary" id="calcPanel" type="button">CALCULAR</button>
                    </div>

                    <button class="btn-secondary back-btn" type="button">VOLVER</button>
                </div>
            </section>

            <section class="screen hidden" id="glassScreen">
                <div class="module-screen">
                    <div class="section-label">CRISTAL TEMPLADO</div>
                    <div class="card-grid" id="glassTypeGrid">
                        <button class="touch-card" type="button">
                            <span class="material-symbols-outlined" aria-hidden="true">shower</span>
                            <span class="card-title">MAMPARA</span>
                        </button>
                        <button class="touch-card" type="button">
                            <span class="material-symbols-outlined" aria-hidden="true">door_open</span>
                            <span class="card-title">PUERTA</span>
                        </button>
                    </div>
                    <div class="flex">
                        <select class="input-line" aria-label="Espesor">
                            <option>8MM</option>
                            <option selected>10MM</option>
                            <option>12MM</option>
                        </select>
                        <select class="input-line" aria-label="Acabado">
                            <option>INCOLORO</option>
                            <option>BRONCE</option>
                        </select>
                    </div>
                    <div class="text-center price-pill">DESDE <strong>$8,450</strong></div>
                    <button class="btn-primary success-btn" type="button" style="background:#1B5E20;">CONSULTAR / WHATSAPP</button>
                    <button class="btn-secondary back-btn" type="button">VOLVER</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="Principal">
            <button class="nav-item active" data-tab="home" type="button">
                <span class="material-symbols-outlined" aria-hidden="true">grid_view</span>
                <span>INICIO</span>
            </button>
            <button class="nav-item" data-tab="projects" type="button">
                <span class="material-symbols-outlined" aria-hidden="true">folder</span>
                <span>PROYECTOS</span>
            </button>
            <button class="nav-item" data-tab="tools" type="button">
                <span class="material-symbols-outlined" aria-hidden="true">construction</span>
                <span>HERRAMIENTAS</span>
            </button>
            <button class="nav-item" data-tab="profile" type="button">
                <span class="material-symbols-outlined" aria-hidden="true">person</span>
                <span>PERFIL</span>
            </button>
        </nav>
    </div>
</div>

<div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

<script src="js/app.js"></script>
</body>
</html>
