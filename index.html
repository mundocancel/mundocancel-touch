<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>mundocancel Touch · Scalable Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <style>
        /* Estilos base similares a la versión anterior (minimalista) */
        :root {
            --primary: #000000;
            --on-primary: #FFFFFF;
            --background: #F9F9F9;
            --surface: #FFFFFF;
            --outline: #CFC4C5;
            --text-high: #1B1B1B;
            --text-mid: #5E5E5E;
            --error: #BA1A1A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #E5E5E5;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .phone {
            width: 100%;
            max-width: 420px;
            height: 800px;
            background: var(--background);
            border-radius: 0;
            box-shadow: 0 0 0 8px #1B1B1B, 0 30px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .topbar {
            background: var(--primary);
            color: var(--on-primary);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--outline);
            border: 1px solid var(--outline);
        }
        .touch-card {
            background: var(--surface);
            padding: 28px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }
        .touch-card:active { background: #E2E2E2; }
        .material-symbols-outlined { font-size: 42px; font-variation-settings: 'FILL' 0, 'wght' 300; }
        .btn-primary {
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            padding: 18px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
        }
        .input-line {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--outline);
            padding: 14px 4px;
            font-size: 18px;
            outline: none;
            width: 100%;
        }
        .hidden { display: none !important; }
        .flex { display: flex; gap: 12px; align-items: center; }
        .text-center { text-align: center; }
        /* Paleta de comandos (terminal) */
        .command-palette {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: var(--primary);
            color: white;
            border: 2px solid var(--outline);
            padding: 18px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .command-palette input {
            background: transparent;
            border: none;
            border-bottom: 2px solid white;
            color: white;
            font-size: 18px;
            padding: 8px 0;
            outline: none;
        }
        .command-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 14px;
            letter-spacing: 0.05em;
        }
        .command-list div { padding: 6px; cursor: pointer; }
        .command-list div:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
<div class="phone" id="appRoot">
    <!-- Barra superior con activación de paleta -->
    <div class="topbar">
        <span>mundocancel</span>
        <span id="cmdTrigger" style="cursor:pointer;">⌨️ /</span>
    </div>

    <!-- Contenido dinámico -->
    <div class="main-content" id="mainContent">
        <!-- Se renderiza según el estado -->
    </div>

    <!-- Paleta de comandos (inicialmente oculta) -->
    <div id="commandPalette" class="command-palette hidden">
        <input type="text" id="cmdInput" placeholder="Escribe un comando...">
        <div class="command-list" id="cmdSuggestions"></div>
    </div>
</div>

<script>
    // ========== MUNDO.core.js (Núcleo) ==========
    const MundoCore = {
        // Registro de módulos (skills)
        registry: new Map(),

        // Estado global de la aplicación
        state: {
            screen: 'home',        // 'home', 'projects', 'budget', 'cutter', 'glass'
            history: [],           // TimeStack para deshacer
            currentIndex: -1,
        },

        // Inicializa el core
        init() {
            this.loadState();
            this.registerModules();
            this.render();
            this.setupCommandPalette();
            this.setupGlobalListeners();
        },

        // Registra todos los módulos disponibles
        registerModules() {
            this.register('home', {
                icon: 'grid_view',
                label: 'INICIO',
                action: () => this.navigate('home')
            });
            this.register('projects', {
                icon: 'folder_open',
                label: 'PROYECTOS',
                action: () => this.navigate('projects')
            });
            this.register('budget', {
                icon: 'edit_square',
                label: 'PRESUPUESTO',
                action: () => this.navigate('budget')
            });
            this.register('cutter', {
                icon: 'content_cut',
                label: 'CORTE',
                action: () => this.navigate('cutter')
            });
            this.register('glass', {
                icon: 'blur_on',
                label: 'CRISTAL',
                action: () => this.navigate('glass')
            });
            // Comandos auxiliares
            this.register('help', {
                icon: 'help',
                label: 'AYUDA',
                action: () => alert('Comandos: home, projects, budget, cutter, glass')
            });
        },

        // Registra un comando
        register(name, config) {
            this.registry.set(name, config);
        },

        // Cambia la pantalla actual y guarda en historial
        navigate(screen) {
            this.saveHistory();
            this.state.screen = screen;
            this.render();
            this.saveState();
        },

        // Guarda el estado actual en el historial (TimeStack)
        saveHistory() {
            this.state.history = this.state.history.slice(0, this.state.currentIndex + 1);
            this.state.history.push({ ...this.state });
            this.state.currentIndex = this.state.history.length - 1;
        },

        // Deshacer (volver a la pantalla anterior)
        undo() {
            if (this.state.currentIndex > 0) {
                this.state.currentIndex--;
                this.state = { ...this.state.history[this.state.currentIndex] };
                this.render();
                this.saveState();
            }
        },

        // Persistencia en localStorage
        saveState() {
            localStorage.setItem('mundocancel_state', JSON.stringify(this.state));
        },

        loadState() {
            const saved = localStorage.getItem('mundocancel_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    this.state = parsed;
                    // Reiniciar historial al cargar para evitar problemas
                    this.state.history = [parsed];
                    this.state.currentIndex = 0;
                } catch(e) {}
            }
        },

        // Configura la paleta de comandos (estilo terminal)
        setupCommandPalette() {
            const palette = document.getElementById('commandPalette');
            const input = document.getElementById('cmdInput');
            const trigger = document.getElementById('cmdTrigger');
            const suggestions = document.getElementById('cmdSuggestions');

            trigger.addEventListener('click', () => {
                palette.classList.toggle('hidden');
                if (!palette.classList.contains('hidden')) input.focus();
            });

            input.addEventListener('input', () => {
                const filter = input.value.toLowerCase();
                const matches = [];
                for (let [name, config] of this.registry) {
                    if (name.includes(filter) || config.label.toLowerCase().includes(filter)) {
                        matches.push({ name, ...config });
                    }
                }
                suggestions.innerHTML = matches.map(m => 
                    `<div onclick="MundoCore.executeCommand('${m.name}')">${m.label} (${m.name})</div>`
                ).join('');
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.value.trim();
                    if (cmd) this.executeCommand(cmd);
                    palette.classList.add('hidden');
                    input.value = '';
                } else if (e.key === 'Escape') {
                    palette.classList.add('hidden');
                }
            });
        },

        // Ejecuta un comando por nombre
        executeCommand(name) {
            const cmd = this.registry.get(name);
            if (cmd) {
                cmd.action();
            }
        },

        // Escucha global para teclas (deshacer con Ctrl+Z, etc.)
        setupGlobalListeners() {
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    e.preventDefault();
                    this.undo();
                }
                if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
                    e.preventDefault();
                    document.getElementById('commandPalette').classList.remove('hidden');
                    document.getElementById('cmdInput').focus();
                }
            });
        },

        // Renderiza la pantalla actual
        render() {
            const container = document.getElementById('mainContent');
            // Limpiar
            container.innerHTML = '';
            // Crear contenido según pantalla
            switch(this.state.screen) {
                case 'home':
                    container.innerHTML = this.renderHome();
                    break;
                case 'projects':
                    container.innerHTML = this.renderProjects();
                    break;
                case 'budget':
                    container.innerHTML = this.renderBudget();
                    break;
                case 'cutter':
                    container.innerHTML = this.renderCutter();
                    break;
                case 'glass':
                    container.innerHTML = this.renderGlass();
                    break;
                default:
                    container.innerHTML = '<p>Pantalla no encontrada</p>';
            }
        },

        // Funciones de renderizado (extraídas a MUNDO.ui.js idealmente)
        renderHome() {
            return `
                <div class="text-center" style="font-weight:700; letter-spacing:0.08em;">OPERACIONES</div>
                <div class="card-grid">
                    <div class="touch-card" onclick="MundoCore.navigate('budget')">
                        <span class="material-symbols-outlined">edit_square</span>
                        <span>PRESUPUESTO</span>
                    </div>
                    <div class="touch-card" onclick="MundoCore.navigate('projects')">
                        <span class="material-symbols-outlined">folder_open</span>
                        <span>PROYECTOS</span>
                    </div>
                    <div class="touch-card" onclick="MundoCore.navigate('cutter')">
                        <span class="material-symbols-outlined">content_cut</span>
                        <span>CORTE</span>
                    </div>
                    <div class="touch-card" onclick="MundoCore.navigate('glass')">
                        <span class="material-symbols-outlined">blur_on</span>
                        <span>CRISTAL</span>
                    </div>
                </div>
            `;
        },

        renderProjects() {
            return `
                <div style="font-weight:700; letter-spacing:0.08em;">PROYECTOS</div>
                <input class="input-line" placeholder="BUSCAR...">
                <div class="touch-card" style="flex-direction:row; justify-content:space-between; padding:16px;">
                    <span>#078 Ventanal Ruiz</span>
                    <span style="background:black; color:white; padding:4px 12px;">TALLER</span>
                </div>
                <button class="btn-primary" onclick="MundoCore.navigate('home')">VOLVER</button>
            `;
        },

        renderBudget() {
            return `
                <div style="font-weight:700; letter-spacing:0.08em;">NUEVO PRESUPUESTO</div>
                <input class="input-line" placeholder="NOMBRE DEL CLIENTE">
                <div class="flex"><input class="input-line" placeholder="ANCHO (mm)"><input class="input-line" placeholder="ALTO (mm)"></div>
                <button class="btn-primary" onclick="MundoCore.navigate('home')">GUARDAR Y VOLVER</button>
            `;
        },

        renderCutter() {
            return `
                <div style="font-weight:700; letter-spacing:0.08em;">OPTIMIZADOR</div>
                <div class="card-grid">
                    <div class="touch-card"><span class="material-symbols-outlined">horizontal_rule</span>PERFIL</div>
                    <div class="touch-card"><span class="material-symbols-outlined">crop_square</span>VIDRIO</div>
                </div>
                <button class="btn-primary" onclick="MundoCore.navigate('home')">VOLVER</button>
            `;
        },

        renderGlass() {
            return `
                <div style="font-weight:700; letter-spacing:0.08em;">CRISTAL TEMPLADO</div>
                <select class="input-line"><option>10MM</option><option>12MM</option></select>
                <button class="btn-primary" onclick="MundoCore.navigate('home')">COTIZAR</button>
            `;
        }
    };

    // Arranque
    document.addEventListener('DOMContentLoaded', () => {
        MundoCore.init();
    });
</script>
</body>
</html>
